<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM Data Processing Viewer</title>

    <!-- Glycerine Viewer CSS -->
    <link rel="stylesheet" href="https://unpkg.com/glycerine-viewer@latest/jslib/style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #252525;
            --border-color: #333;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-color: #3b82f6;
            /* Blue */
            --accent-hover: #2563eb;
            --highlight-bg: #3b82f620;
            --font-family: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            /* Full viewport height */
            overflow: hidden;
            /* No overall scrollbar */
            display: grid;
            grid-template-columns: 60% 40%;
            grid-template-rows: 30% 70%;
            width: 100vw;
        }

        /* Layout Panes */
        #viewer-pane {
            grid-row: 1 / span 2;
            grid-column: 1;
            background-color: #000;
            position: relative;
            border-right: 1px solid var(--border-color);
        }

        #metadata-pane {
            grid-row: 1;
            grid-column: 2;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        #list-pane {
            grid-row: 2;
            grid-column: 2;
            background-color: var(--panel-bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Internal scrolling handled by list */
        }

        /* Viewer Container */
        #glycerine-viewer {
            width: 100%;
            height: 100%;
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background-color: #1f1f1f;
        }

        .tab {
            padding: 1rem 1.5rem;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
            background-color: var(--panel-bg);
        }

        /* Syllables List */
        #syllables-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .syllable-item {
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.15s;
            display: flex;
            align-items: center;
        }

        .syllable-item:hover {
            background-color: #2a2a2a;
        }

        .syllable-item.selected {
            background-color: var(--highlight-bg);
            border-left: 3px solid var(--accent-color);
            padding-left: calc(1.5rem - 3px);
            /* Adjust for border */
        }

        .syllable-label {
            font-size: 1rem;
            font-weight: 400;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--panel-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Metadata Styles */
        .metadata-header {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .metadata-title {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 1.5rem;
            min-height: 2.4rem;
            /* Prevent layout shift */
        }

        .grapheme-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .grapheme-table th,
        .grapheme-table td {
            text-align: left;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .grapheme-table th {
            color: var(--text-secondary);
            font-weight: 500;
            width: 30%;
        }

        .grapheme-table td {
            width: 70%;
        }

        .grapheme-link a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .grapheme-link a:hover {
            text-decoration: underline;
        }

        .empty-state {
            color: var(--text-secondary);
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
    </style>
</head>

<body>

    <!-- Left Pane: Viewer -->
    <div id="viewer-pane">
        <div id="glycerine-viewer"></div>
    </div>

    <!-- Top-Right Pane: Metadata -->
    <div id="metadata-pane">
        <div id="metadata-content" style="display: none;">
            <div class="metadata-header">Selected Syllable</div>
            <div class="metadata-title" id="meta-label"></div>

            <div class="metadata-header">Grapheme Breakdown</div>
            <table class="grapheme-table">
                <thead>
                    <tr>
                        <th>Grapheme</th>
                        <th>TCM</th>
                        <th>URL</th>
                    </tr>
                </thead>
                <tbody id="meta-breakdown">
                    <!-- Rows will be injected here -->
                </tbody>
            </table>
        </div>
        <div id="metadata-empty" class="empty-state">
            Select a syllable to view details
        </div>
    </div>

    <!-- Bottom-Right Pane: Syllables List -->
    <div id="list-pane">
        <div class="tabs">
            <div class="tab active">Syllables</div>
            <!-- More tabs in future -->
        </div>
        <ul id="syllables-list">
            <!-- Items injected here -->
        </ul>
    </div>

    <!-- Cylinder Viewer Script -->
    <script src="https://unpkg.com/glycerine-viewer@latest/jslib/glycerine-viewer.umd.cjs"></script>

    <script>
        const MANIFEST_URL = 'https://systemik-solutions.github.io/im-data-processing/output/RS22_02/RS22_02_manifest.json';
        const ANNOTATION_URL = 'output/RS22_02/RS22_02_annotation_page_segments.json';

        let viewer;
        let annotations = []; // Normalized data

        // DOM Elements
        const syllablesListEl = document.getElementById('syllables-list');
        const metadataContentEl = document.getElementById('metadata-content');
        const metadataEmptyEl = document.getElementById('metadata-empty');
        const metaLabelEl = document.getElementById('meta-label');
        const metaBreakdownEl = document.getElementById('meta-breakdown');

        async function init() {
            // 1. Initialize Viewer
            initViewer();

            // 2. Fetch and Parse Data
            await loadAnnotations();

            // 3. Render List
            renderSyllables();
        }

        function initViewer() {
            const ele = document.getElementById('glycerine-viewer');
            // Assuming the container needs explicit dimensions or it fills parent. 
            // In grid, the parent #viewer-pane has 100% height/width of cell.
            // We pass '100%' for width/height.
            viewer = new GlycerineViewer(ele, {
                manifest: MANIFEST_URL,
                width: '100%',
                height: '100%',
                defaultInfoPanel: false,
                showFullScreenButton: false,
                showIndexButton: false,
                showAnnotationViewButton: false,
                showAboutPaneButton: false,
                showSettingPaneButton: false,
                showCollectionPaneButton: false,
                showPlayControls: false,
                // Optional: Hide default info panel if requested to be cleaner, 
                // but user didn't specify. Keeping defaults.
            });
            viewer.init();
        }

        async function loadAnnotations() {
            try {
                const response = await fetch(ANNOTATION_URL);
                const data = await response.json();

                // Navigate to items: AnnotationPage -> items -> Annotation[]
                const items = data.items || [];

                annotations = items.map(processAnnotation).filter(item => item !== null);

            } catch (err) {
                console.error("Failed to load annotations:", err);
            }
        }

        function processAnnotation(annotation) {
            // Check body for Graphemes
            if (!annotation.body) return null;

            const graphemes = [];
            let bodies = Array.isArray(annotation.body) ? annotation.body : [annotation.body];

            bodies.forEach(body => {
                if (body.type === 'TextualBody' && body.format === 'text/html') {
                    // Simple parsing using DOMParser
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(body.value, 'text/html');

                    const labelEl = doc.querySelector('.field-label');
                    if (labelEl && labelEl.textContent.trim() === 'Grapheme') {
                        const valueEl = doc.querySelector('.field-value a');
                        if (valueEl) {
                            const value = valueEl.textContent.trim();
                            const href = valueEl.getAttribute('href');
                            const tcm = valueEl.getAttribute('data-tcm') || '';

                            graphemes.push({
                                value: value,
                                url: href,
                                tcm: tcm
                            });
                        }
                    }
                }
            });

            if (graphemes.length === 0) return null;

            const label = graphemes.map(g => g.value).join('');

            return {
                id: annotation.id,
                label: label,
                graphemes: graphemes
            };
        }

        function renderSyllables() {
            syllablesListEl.innerHTML = '';

            annotations.forEach(item => {
                const li = document.createElement('li');
                li.className = 'syllable-item';
                li.innerHTML = `<span class="syllable-label">${item.label}</span>`;

                li.addEventListener('click', () => {
                    selectSyllable(li, item);
                });

                syllablesListEl.appendChild(li);
            });
        }

        let selectedId = null;

        function selectSyllable(liElement, item) {
            // Toggle logic
            if (selectedId === item.id) {
                // Deselect
                selectedId = null;
                viewer.setAnnotationIdFilter(); // Reset filter (show all or default) - API says "call... with no parameter"

                // UI Visuals
                document.querySelectorAll('.syllable-item').forEach(el => el.classList.remove('selected'));

                // Metadata
                showMetadata(null);
            } else {
                // Select
                selectedId = item.id;
                // Docs: ids is array
                viewer.setAnnotationIdFilter([item.id]);

                // UI Visuals
                document.querySelectorAll('.syllable-item').forEach(el => el.classList.remove('selected'));
                liElement.classList.add('selected');

                // Metadata
                showMetadata(item);
            }
        }

        function showMetadata(item) {
            if (!item) {
                metadataContentEl.style.display = 'none';
                metadataEmptyEl.style.display = 'flex';
                return;
            }

            metadataEmptyEl.style.display = 'none';
            metadataContentEl.style.display = 'block';

            metaLabelEl.textContent = item.label;

            metaBreakdownEl.innerHTML = item.graphemes.map(g => `
                <tr>
                    <td>${g.value}</td>
                    <td>${g.tcm || '-'}</td>
                    <td class="grapheme-link"><a href="${g.url}" target="_blank">Link</a></td>
                </tr>
            `).join('');
        }

        // Start
        init();

    </script>
</body>

</html>
